[build]
builder = "nixpacks"
buildCommand = "npm install --include=dev"

[deploy]
startCommand = "mkdir -p /app/data && node --import tsx/esm server/index.js"
healthcheckPath = "/api/ping"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/app/data"
